global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: cineverse-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]
        labels: { service: cineverse-backend }

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
