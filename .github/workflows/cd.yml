name: CD

# This workflow demonstrates a production deploy pipeline (GHCR image build →
# SSH to VPS → run migrations). It is disabled from auto-running because the
# demo lives on Vercel, not a VPS.
#
# To enable for real production:
#   1. Provision a VPS with Docker + docker-compose
#   2. Add repository secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY
#   3. Change the trigger below back to: push: { branches: [main], tags: ["v*"] }

on:
  # Manual-only trigger — no auto runs on push.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/backend
  IMAGE_FRONTEND: ${{ github.repository }}/frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}
      - name: Frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    if: ${{ vars.VPS_HOST != '' }}     # skip cleanly when no VPS configured
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/cineverse
            git pull --rebase
            docker compose -f devops/docker/docker-compose.yml pull
            docker compose -f devops/docker/docker-compose.yml up -d --remove-orphans
            docker compose -f devops/docker/docker-compose.yml exec -T app \
              alembic upgrade head
