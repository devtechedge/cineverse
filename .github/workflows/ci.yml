name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend lint + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: cineverse
          POSTGRES_USER: cineverse
          POSTGRES_DB: cineverse_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U cineverse"
          --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=3s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip", cache-dependency-path: backend/requirements.txt }
      - run: pip install -r backend/requirements.txt ruff mypy
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .
      - name: Type-check (mypy)
        working-directory: backend
        run: mypy app || true   # advisory; relax in early stages
      - name: Test
        working-directory: backend
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://cineverse:cineverse@localhost:5432/cineverse_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-please-rotate
          STORAGE_ROOT: /tmp/cineverse-test
        run: pytest -q --maxfail=1

  frontend:
    name: Frontend lint + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: frontend/package-lock.json }
      - working-directory: frontend
        run: npm install --no-audit --no-fund
      - working-directory: frontend
        run: npm run lint || true
      - working-directory: frontend
        run: npm run typecheck
      - working-directory: frontend
        run: npm test -- --run
      - working-directory: frontend
        run: npm run build

  docker:
    name: Build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/Dockerfile.backend
          push: false
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/Dockerfile.frontend
          push: false
