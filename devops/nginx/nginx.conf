worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml
               application/vnd.apple.mpegurl;

    # Upload sizing — chunks are ~1MB; allow a safety margin
    client_max_body_size 25M;
    client_body_buffer_size 1m;
    proxy_request_buffering off;

    # Rate limiting — 30 r/s per IP, burst 60
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_status 429;

    upstream backend  { server app:8000; keepalive 32; }
    upstream frontend { server web:3000; keepalive 32; }

    server {
        listen 80 default_server;
        server_name _;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # WebSocket upgrade for live upload progress
        location /api/v1/ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # API
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Preserve range requests for /stream endpoints
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;
            proxy_buffering off;
        }

        # Health probe passthrough
        location = /health { proxy_pass http://backend; }
        location = /metrics { proxy_pass http://backend; allow 127.0.0.1; deny all; }

        # Frontend (Next.js)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ----- Optional SSL template (uncomment + provide certs) -----
    # server {
    #   listen 443 ssl http2;
    #   server_name cineverse.example.com;
    #   ssl_certificate     /etc/letsencrypt/live/cineverse/fullchain.pem;
    #   ssl_certificate_key /etc/letsencrypt/live/cineverse/privkey.pem;
    #   ssl_protocols TLSv1.2 TLSv1.3;
    #   ssl_ciphers HIGH:!aNULL:!MD5;
    #   include /etc/nginx/conf.d/cineverse-locations.conf;
    # }
}
