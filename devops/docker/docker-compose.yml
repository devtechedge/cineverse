version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cineverse
      POSTGRES_PASSWORD: cineverse
      POSTGRES_DB: cineverse
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cineverse"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ../..
      dockerfile: devops/docker/Dockerfile.backend
    restart: unless-stopped
    env_file: ../../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://cineverse:cineverse@db:5432/cineverse
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data/cineverse
      FRONTEND_ORIGIN: http://localhost
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - media:/data/cineverse
    expose: ["8000"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ../..
      dockerfile: devops/docker/Dockerfile.frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost
      NEXT_PUBLIC_WS_BASE_URL: ws://localhost
    depends_on:
      - app
    expose: ["3000"]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [app, web]
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ../../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../observability/alerting/rules.yml:/etc/prometheus/rules.yml:ro
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana-oss:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: cineverse
    volumes:
      - grafana-data:/var/lib/grafana
      - ../../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3001:3000"]

volumes:
  db-data:
  redis-data:
  media:
  grafana-data:
